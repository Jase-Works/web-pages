<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碩士論文口試簡報</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; background: #0A0F1F; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.lock-screen { text-align: center; color: white; }
.lock-screen h1 { font-size: 28px; margin-bottom: 8px; }
.lock-screen p { color: rgba(255,255,255,0.5); margin-bottom: 24px; font-size: 16px; }
.lock-screen input { padding: 12px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 16px; width: 200px; text-align: center; outline: none; }
.lock-screen input:focus { border-color: #1EA672; }
.lock-screen button { margin-left: 8px; padding: 12px 24px; border-radius: 8px; border: none; background: #1EA672; color: white; font-size: 16px; cursor: pointer; font-weight: 600; }
.lock-screen button:hover { background: #17905f; }
.error { color: #E05A6F; font-size: 14px; margin-top: 12px; display: none; }
.links { display: none; margin-top: 32px; }
.links a { display: block; padding: 16px 32px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: white; text-decoration: none; font-size: 18px; transition: all 0.2s; cursor: pointer; }
.links a:hover { background: rgba(30,166,114,0.15); border-color: #1EA672; }
#content-frame { display: none; width: 100vw; height: 100vh; border: none; position: fixed; top: 0; left: 0; z-index: 9999; }
</style>
</head>
<body>
<div class="lock-screen" id="lock">
  <h1>🔒 碩士論文口試簡報</h1>
  <p id="instruction" style="color: rgba(255,255,255,0.5); margin-bottom: 24px; font-size: 16px; display: none;">請點選下面簡報進入</p>
  <p id="pw-prompt">請輸入密碼瀏覽</p>
  <div>
    <input type="password" id="pw" placeholder="密碼" onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">進入</button>
  </div>
  <div class="error" id="err">密碼錯誤</div>
  <div class="links" id="links">
    <a onclick="loadPage('v7.html')">林志明-口試簡報</a>
    <div style="display:flex; gap:8px; margin:-6px 0 12px 0;">
      <a href="林志明_口試本.pdf" download style="font-size:13px; padding:8px 14px; flex:1; text-align:center;">📥 口試本(PDF)</a>
      <a href="林志明_口試簡報.pdf" download style="font-size:13px; padding:8px 14px; flex:1; text-align:center;">📥 簡報(PDF)</a>
    </div>
    <a onclick="loadPage('hsu.html')">許郁欣-口試簡報</a>
    <div style="display:flex; gap:8px; margin:-6px 0 12px 0;">
      <a href="許郁欣_口試本.pdf" download style="font-size:13px; padding:8px 14px; flex:1; text-align:center;">📥 口試本(PDF)</a>
      <a href="許郁欣_口試簡報.pdf" download style="font-size:13px; padding:8px 14px; flex:1; text-align:center;">📥 簡報(PDF)</a>
    </div>
  </div>
</div>
<iframe id="content-frame"></iframe>
<script>
function check() {
  const pw = document.getElementById('pw').value;
  if (pw === 'scu') {
    document.getElementById('links').style.display = 'block';
    document.getElementById('err').style.display = 'none';
    document.getElementById('instruction').style.display = 'block';
    document.querySelector('input').style.display = 'none';
    document.querySelector('button').style.display = 'none';
    document.querySelector('p#pw-prompt').style.display = 'none';
  } else {
    document.getElementById('err').style.display = 'block';
  }
}
function loadPage(url) {
  document.getElementById('lock').style.display = 'none';
  const frame = document.getElementById('content-frame');
  frame.src = url;
  frame.style.display = 'block';
}
</script>
</body>
</html>
